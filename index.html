<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Family Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Nickname Overlay ─────────────────────────────────────────────────── -->
<div id="nickname-overlay" class="overlay hidden">
  <div class="overlay-card">
    <h2>Welcome to Family Calendar</h2>
    <p>請選擇你是誰</p>
    <div id="known-members-list" class="chip-row"></div>
  </div>
</div>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="app-title">Family Calendar</span>
  </div>
  <div class="header-right">
    <div id="user-chip" class="user-chip" title="切換使用者">
      <span id="user-chip-name">…</span>
      <span class="chip-arrow">▾</span>
    </div>
    <div id="user-dropdown" class="dropdown hidden"></div>
  </div>
</header>

<!-- ── Tabs ────────────────────────────────────────────────────────────── -->
<nav class="tabs">
  <button class="tab active" data-tab="upcoming">近期事項</button>
  <button class="tab" data-tab="calendar">月曆</button>
</nav>

<!-- ── Calendar View ───────────────────────────────────────────────────── -->
<div id="view-calendar" class="view hidden">
  <div class="cal-nav">
    <button id="cal-prev" class="nav-btn">&#8249;</button>
    <span id="cal-title" class="cal-title"></span>
    <button id="cal-next" class="nav-btn">&#8250;</button>
    <button id="cal-today" class="today-btn">今天</button>
  </div>
  <div class="cal-grid">
    <div class="cal-weekday">一</div>
    <div class="cal-weekday">二</div>
    <div class="cal-weekday">三</div>
    <div class="cal-weekday">四</div>
    <div class="cal-weekday">五</div>
    <div class="cal-weekday">六</div>
    <div class="cal-weekday">日</div>
  </div>
  <div id="cal-cells" class="cal-cells"></div>
</div>

<!-- ── Upcoming View ───────────────────────────────────────────────────── -->
<div id="view-upcoming" class="view">
  <div id="upcoming-list" class="upcoming-list"></div>
</div>

<!-- ── FAB ────────────────────────────────────────────────────────────── -->
<button id="fab" class="fab" title="新增事項">＋</button>

<!-- ── Event Modal ─────────────────────────────────────────────────────── -->
<div id="event-modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modal-title">新增事項</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <label>標題 <span class="required">*</span></label>
      <input id="ev-title" type="text" placeholder="事項名稱" maxlength="60" />

      <div class="row-2">
        <div>
          <label>日期 <span class="required">*</span></label>
          <input id="ev-date" type="date" />
        </div>
        <div>
          <label>時間（可留空）</label>
          <input id="ev-time" type="time" />
        </div>
      </div>

      <label>負責家人</label>
      <div id="ev-members" class="chip-row selectable"></div>

      <label>備註 / 需準備文件</label>
      <textarea id="ev-notes" rows="4" placeholder="例如：帶健保卡、準備報告…"></textarea>
    </div>
    <div class="modal-footer">
      <button id="ev-delete" class="btn-danger hidden">刪除</button>
      <div class="spacer"></div>
      <button id="ev-cancel" class="btn-secondary">取消</button>
      <button id="ev-save" class="btn-primary">儲存</button>
    </div>
  </div>
</div>

<!-- ── Firebase SDK ────────────────────────────────────────────────────── -->
<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, doc,
    addDoc, updateDoc, deleteDoc,
    onSnapshot, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.__firebase = {
    app: initializeApp(firebaseConfig),
  };
  const db = getFirestore(window.__firebase.app);
  window.__db = db;
  window.__fs = { collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp };

  // app.js 等待 Firebase 就緒後再啟動
  const script = document.createElement('script');
  script.src = 'app.js';
  document.body.appendChild(script);
</script>

</body>
</html>
